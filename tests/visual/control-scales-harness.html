<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verificação visual das escalas completas</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
      :root {
        --interactive-accent: #8b6df4;
        --background-primary: #201e27;
        --background-primary-alt: #292633;
        --background-modifier-border: #4b4657;
        --background-modifier-border-focus: #8b6df4;
        --background-modifier-hover: #35313f;
        --text-normal: #f5f2fa;
        --text-muted: #b7b0c1;
        --text-on-accent: #fff;
        --font-interface: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      * { box-sizing: border-box; }
      body { margin: 0; background: #121117; color: #f5f2fa; font: 16px var(--font-interface); }
      main { display: flex; min-height: 100vh; align-items: flex-start; gap: 110px; padding: 40px; }
      figure { margin: 0; text-align: center; }
      figcaption { margin-bottom: 16px; font-weight: 700; }
      .stage { display: flex; min-width: 130px; min-height: 640px; justify-content: center; align-items: flex-start; }
      .stage .oa-font-scale-root { position: relative; inset: auto; width: max-content; height: max-content; contain: none; }
      .stage .oa-font-scale-panel { position: relative; left: auto; top: auto; max-height: none; overflow: visible; }
    </style>
  </head>
  <body>
    <main id="scales"></main>
    <script>
      const states = [
        ['Grande · 150%', 'large'],
        ['Média · 100%', 'medium'],
        ['Mínima · 50%', 'small'],
      ];
      const host = document.querySelector('#scales');

      for (const [label, scale] of states) {
        const figure = document.createElement('figure');
        figure.innerHTML = `
          <figcaption>${label}</figcaption>
          <div class="stage">
            <div class="oa-font-scale-root is-scale-${scale}">
              <section class="oa-font-scale-panel">
                <div class="oa-font-scale-panel__mode oa-font-scale-panel__text">55 px</div>
                <button class="oa-font-scale-panel__button oa-font-scale-panel__zen-mode" aria-label="Modo zen">◇</button>
                <button class="oa-font-scale-panel__button oa-font-scale-panel__step" aria-label="Aumentar">+</button>
                <div class="oa-font-scale-panel__range-frame" style="--oa-font-scale-range-position:46.5%">
                  <div class="oa-font-scale-panel__range-visual"><div class="oa-font-scale-panel__range-rail"><div class="oa-font-scale-panel__range-track"></div><div class="oa-font-scale-panel__range-thumb"></div></div></div>
                  <input class="oa-font-scale-panel__range" type="range" min="32" max="75" value="55" aria-orientation="vertical">
                </div>
                <button class="oa-font-scale-panel__button oa-font-scale-panel__step" aria-label="Diminuir">−</button>
                <button class="oa-font-scale-panel__button oa-font-scale-panel__reset" aria-label="Restaurar">↺</button>
              </section>
            </div>
          </div>`;
        host.append(figure);
      }
    </script>
  </body>
</html>
