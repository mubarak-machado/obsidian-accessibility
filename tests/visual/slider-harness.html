<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verificação visual do slider</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
      :root {
        --interactive-accent: #00e600;
        --background-modifier-border: #14532d;
        --background-modifier-border-focus: #00e600;
        --background-primary: #30002f;
        --text-normal: #fff;
      }

      body {
        margin: 0;
        background: #210020;
        color: #fff;
        font: 16px system-ui, sans-serif;
      }

      main {
        display: flex;
        min-height: 100vh;
        box-sizing: border-box;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 36px;
        padding: 32px;
      }

      figure {
        margin: 0;
        text-align: center;
      }

      figcaption {
        margin-bottom: 12px;
      }

      .visual-stage .oa-font-scale-panel {
        position: relative;
        left: auto;
        top: auto;
        display: flex;
        max-height: none;
        overflow: visible;
      }

      .visual-stage .oa-font-scale-root {
        position: relative;
        inset: auto;
        width: max-content;
        height: max-content;
        contain: none;
      }

      .visual-stage .compact .oa-font-scale-panel__range-frame {
        height: 180px;
      }

      output {
        display: block;
        margin-top: 12px;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <main class="visual-stage"></main>
    <script>
      const states = [
        ['Leitura máxima · 75 px', 32, 75, 75, false],
        ['Leitura intermediária · 55 px', 32, 75, 55, false],
        ['Leitura mínima · 32 px', 32, 75, 32, false],
        ['Edição máxima · 60 px', 32, 60, 60, false],
        ['Edição intermediária · 50 px', 32, 60, 50, false],
        ['Edição mínima · 32 px', 32, 60, 32, false],
        ['Compacto · edição 50 px', 32, 60, 50, true],
      ];
      const stage = document.querySelector('.visual-stage');

      for (const [label, minimum, maximum, value, compact] of states) {
        const position = `${((maximum - value) / (maximum - minimum)) * 100}%`;
        const figure = document.createElement('figure');
        if (compact) figure.className = 'compact';
        figure.innerHTML = `
          <figcaption>${label}</figcaption>
          <div class="oa-font-scale-root is-scale-large">
            <section class="oa-font-scale-panel">
              <div class="oa-font-scale-panel__range-frame" style="--oa-font-scale-range-position:${position}">
                <div class="oa-font-scale-panel__range-visual" aria-hidden="true">
                  <div class="oa-font-scale-panel__range-rail">
                    <div class="oa-font-scale-panel__range-track"></div>
                    <div class="oa-font-scale-panel__range-thumb"></div>
                  </div>
                </div>
                <input class="oa-font-scale-panel__range" type="range" min="${minimum}" max="${maximum}" value="${value}" orient="vertical" aria-orientation="vertical">
              </div>
            </section>
          </div>
          <output></output>`;
        stage.append(figure);

        const track = figure.querySelector('.oa-font-scale-panel__range-track').getBoundingClientRect();
        const thumb = figure.querySelector('.oa-font-scale-panel__range-thumb').getBoundingClientRect();
        const deviation = Math.abs(track.left + track.width / 2 - (thumb.left + thumb.width / 2));
        figure.querySelector('output').textContent = `desvio horizontal: ${deviation.toFixed(2)} px`;
        figure.dataset.alignmentDeviation = deviation.toFixed(2);
      }
    </script>
  </body>
</html>
